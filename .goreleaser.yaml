# goreleaser config — https://goreleaser.com
# Local check:  goreleaser release --snapshot --clean
version: 2

project_name: aiss

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - src: shell/*
        dst: shell

homebrew_casks:
  - name: aiss
    repository:
      owner: jarvan1
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/jarvan1/aiss"
    description: "Fuzzy picker over AI CLI session histories (Claude Code / Codex / Copilot / Gemini)"
    # The released binaries are unsigned; strip the Gatekeeper quarantine flag on
    # install so macOS doesn't block them.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/aiss"]
          end
    caveats: |
      To enable the Ctrl-X Ctrl-W key binding, add one line to your shell rc:
        eval "$(aiss init zsh)"     # or: aiss init bash | aiss init fish

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: jarvan1
    name: aiss
  draft: false
  prerelease: auto
